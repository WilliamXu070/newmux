# newmux development tmux config.
#
# This config gives the fork a visible test surface before the real recovery
# commands exist.

set-option -g status on
set-option -g status-left " newmux #[bold]#{session_name}#[default] "
set-option -g status-right " #{version} | %H:%M "
set-option -g history-limit 200000
set-option -g remain-on-exit on
set-option -g mouse on

bind-key R source-file "/Users/williamxu/Desktop/Projects/newmux/config/newmux-dev.tmux.conf" \; display-message "newmux config reloaded"

# Future target: restore the most recently soft-closed pane/window.
bind-key T display-message "newmux restore hook reached: future reopen-latest-closed"

# Current test target: enter tmux copy mode so we can compare normal scrollback
# against the future newmux visual-history replay model.
bind-key H copy-mode -e

# Trackpad/wheel history test path. Scrolling up enters copy mode and moves
# into tmux scrollback; scrolling down moves back toward live output.
bind-key -n WheelUpPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -e"
bind-key -T copy-mode WheelUpPane select-pane \; send-keys -N 1 -X scroll-up
bind-key -T copy-mode WheelDownPane select-pane \; send-keys -N 1 -X scroll-down
bind-key -T copy-mode-vi WheelUpPane select-pane \; send-keys -N 1 -X scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -N 1 -X scroll-down
